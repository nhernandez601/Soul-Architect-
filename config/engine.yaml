# Soul Architect Engine Configuration
# YAML format — parsed at runtime before engine boot

name: "Soul Architect"
version: "0.1.0"
description: "A Psychological Dark Fantasy Visual Novel"

# Entry point scene
entry_scene: prologue_01

# Scene index (auto-generated by story:validate tool if omitted)
scenes:
  - prologue_01
  - prologue_02_ready
  - prologue_02_curious
  - prologue_02_silent
  - prologue_02_resist
  - prologue_03

# Character manifest
characters:
  - id: seeker
    definition: story/characters/seeker.json
  - id: voice
    definition: story/characters/voice.json
  - id: aurelia
    definition: story/characters/aurelia.json
  - id: nyx
    definition: story/characters/nyx.json
  - id: seraphine
    definition: story/characters/seraphine.json
  - id: mira
    definition: story/characters/mira.json
  - id: echo
    definition: story/characters/echo.json
  - id: elian
    definition: story/characters/elian.json
  - id: watcher
    definition: story/characters/watcher.json
  - id: light
    definition: story/characters/light.json
  - id: shadow
    definition: story/characters/shadow.json

# Asset bundles (loaded on demand)
asset_bundles:
  prologue:
    preload: true
    assets:
      - type: image
        path: /assets/backgrounds/void_space.jpg
      - type: image
        path: /assets/backgrounds/cathedral_dawn.jpg
      - type: audio
        path: /assets/music/themes/prologue_theme.ogg
      - type: audio
        path: /assets/music/ambient/cathedral_ambient.ogg

# Soul system configuration
soul:
  initial_values:
    hope: 50
    faith: 50
    fear: 10
    love: 50
    knowledge: 30
    compassion: 50
    pride: 30
    regret: 10
    memory: 50
    purpose: 50
    light: 50
    shadow: 20
  clamp_min: 0
  clamp_max: 100

# Localization
localization:
  default: en
  available:
    - en
    - ja
    - es
    - fr
    - de
    - zh

# Features
features:
  autosave: true
  cloud_save: false
  mod_support: true
  developer_console: false
  steam_integration: false
